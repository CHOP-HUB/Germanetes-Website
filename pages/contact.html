<section>
    <h2 data-i18n="contact.header">Get in Touch</h2>
    <form action="#" method="post">
        <label for="name" data-i18n="contact.form.nameLabel">Name:</label>
        <input type="text" id="name" name="name" data-i18n-placeholder="contact.form.namePlaceholder" required>
        
        <label for="email" data-i18n="contact.form.emailLabel">Email:</label>
        <input type="email" id="email" name="email" data-i18n-placeholder="contact.form.emailPlaceholder" required>
        
        <label for="message" data-i18n="contact.form.messageLabel">Message:</label>
        <textarea id="message" name="message" data-i18n-placeholder="contact.form.messagePlaceholder" required></textarea>
        
        <button type="submit" data-i18n="contact.form.submit">Send Message</button>
    </form>
    
    <h2 data-i18n="contact.infoHeader">Contact Information</h2>
    <p data-i18n="contact.email">Email: info@communitygarden.org</p>
    <p data-i18n="contact.phone">Phone: (123) 456-7890</p>
    <p data-i18n="contact.address">Address: 123 Garden Lane, Green City, GC 12345</p>
</section>
